<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Fotosyntese Spil</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: white;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #game {
        width: 900px;
        max-width: 95vw;
        padding: 30px;
        border: 2px solid black;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
    }

    .hidden { display: none; }

    /* GUI */
    #gui {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .guiBox {
        border: 2px solid black;
        padding: 10px 16px;
        border-radius: 12px;
        background: #f5f5f5;
        min-width: 120px;
    }
    .guiLabel { font-size: 12px; text-transform: uppercase; }
    .guiValue { font-size: 20px; font-weight: bold; }

    /* Buttons */
    button {
        border: 2px solid black;
        background: white;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover {
        transform: translateY(-3px);
        background: #eee;
    }

    /* Plant */
    #plantContainer {
        width: 320px;
        height: 360px;
        margin: 20px auto;
        position: relative;
    }
    #plant {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 220px;
        height: 320px;
        transform-origin: bottom center;
        transition: 0.4s;
    }
    .pot {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 60px;
        background: #c47a3a;
        border-radius: 12px 12px 4px 4px;
        border: 2px solid black;
    }
    .stem {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 170px;
        background: #0c7a2b;
        border-radius: 999px;
        border: 2px solid black;
    }
    .leaf {
        position: absolute;
        width: 90px;
        height: 45px;
        background: #1ea93a;
        border-radius: 999px;
        border: 2px solid black;
        transform-origin: left center;
    }
    .leaf.left { left: 50%; transform: translateX(-50%) rotate(-25deg); }
    .leaf.right { left: 50%; transform: translateX(-50%) rotate(25deg); }
    .leaf.hidden { opacity: 0; }

    .leaf1 { bottom: 120px; }
    .leaf2 { bottom: 150px; }
    .leaf3 { bottom: 180px; }
    .leaf4 { bottom: 210px; }

    .flower {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: yellow;
        border: 2px solid black;
        opacity: 0;
        transition: 0.3s;
    }

    /* Questions */
    #questionBox {
        border: 2px solid black;
        padding: 20px;
        border-radius: 16px;
        background: #fafafa;
        margin-top: 20px;
    }
    .answerBtn {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid black;
        background: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }
    .answerBtn.correct { background: #8aff8a; border-color: green; }
    .answerBtn.wrong { background: #ff8a8a; border-color: red; }

    /* CO2 PARTICLES */
    .co2Particle {
        position: absolute;
        font-size: 22px;
        font-weight: bold;
        color: #00aaff;
        pointer-events: none;
        animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
        from { opacity: 1; transform: translate(0,0) scale(1); }
        to { opacity: 0; transform: translate(var(--x), var(--y)) scale(0.2); }
    }

    /* FALLING CO2 */
    .co2Fall {
        position: absolute;
        top: -40px;
        font-size: 26px;
        color: #00aaff;
        animation: fall linear forwards;
    }

    @keyframes fall {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(120vh); opacity: 0; }
    }
</style>
</head>
<body>

<div id="game">

    <!-- GUI -->
    <div id="gui">
        <div class="guiBox"><div class="guiLabel">Sollyskraft</div><div class="guiValue" id="sunPower">0</div></div>
        <div class="guiBox"><div class="guiLabel">O₂</div><div class="guiValue" id="oxygen">0</div></div>
        <div class="guiBox"><div class="guiLabel">Tid</div><div class="guiValue" id="timeLeft">0</div></div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1>Fotosyntese Træner</h1>
        <p>Træn din viden og få din plante til at vokse.</p>

        <div id="plantContainer">
            <div id="plant">
                <div class="pot"></div>
                <div class="stem"></div>
                <div class="leaf left leaf1"></div>
                <div class="leaf right leaf1"></div>
                <div class="leaf left leaf2 hidden"></div>
                <div class="leaf right leaf2 hidden"></div>
                <div class="leaf left leaf3 hidden"></div>
                <div class="leaf right leaf3 hidden"></div>
                <div class="leaf left leaf4 hidden"></div>
                <div class="leaf right leaf4 hidden"></div>
                <div class="flower"></div>
            </div>
        </div>

        <button onclick="openTraining()">Træn</button>
        <button onclick="feedPlant()">Giv sollyskraft til planten</button>
    </div>

    <!-- TRAINING MENU -->
    <div id="trainingMenu" class="hidden">
        <h2>Vælg træningstid</h2>
        <button onclick="startTraining(300)">5 min</button>
        <button onclick="startTraining(600)">10 min</button>
        <button onclick="startTraining(900)">15 min</button>
        <button onclick="startTraining(1200)">20 min</button>
        <button onclick="startTraining(1500)">25 min</button>
        <button onclick="startTraining(1800)">30 min</button>
        <button onclick="backToStart()">Tilbage</button>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="questionScreen" class="hidden">
        <h2>Træning i gang</h2>
        <div id="questionBox">
            <div id="questionText"></div>
            <div id="answers"></div>
        </div>
        <button onclick="stopTraining()">Stop træning</button>
    </div>

</div>

<script>
let sunPower = 0;
let oxygen = 0;
let plantLevel = 1;
let timer = null;
let timeLeft = 0;

function showScreen(id) {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("trainingMenu").classList.add("hidden");
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById(id).classList.remove("hidden");
}

function openTraining() { showScreen("trainingMenu"); }
function backToStart() { showScreen("startScreen"); }

const questions = [
    { q: "Hvad bruger planten som energi?", options: ["CO₂", "Sollys", "Vand", "Ilt"], correct: 1 },
    { q: "Hvad optager planten fra luften?", options: ["O₂", "CO₂", "Nitrogen", "Ozon"], correct: 1 },
    { q: "Hvad udskiller planten?", options: ["CO₂", "O₂", "Metan", "Nitrogen"], correct: 1 },
    { q: "Hvad optager planten fra jorden?", options: ["Vand", "Ilt", "CO₂", "Salt"], correct: 0 },
    { q: "Hvad danner planten?", options: ["Glukose", "Protein", "Fedt", "Jern"], correct: 0 },

    { q: "Hvor i planten findes kloroplaster?", options: ["I bladene", "I rødderne", "I frugterne", "I blomsterne"], correct: 0 },
    { q: "Hvad er formålet med klorofyl?", options: ["At optage lys", "At lave rødder", "At lave frø", "At lave vand"], correct: 0 },
    { q: "Hvilken farve absorberer klorofyl dårligst?", options: ["Grøn", "Blå", "Rød", "Gul"], correct: 0 },
    { q: "Hvad er et biprodukt af fotosyntese?", options: ["O₂", "CO₂", "Salt", "Nitrogen"], correct: 0 },
    { q: "Hvad er hovedformålet med fotosyntese?", options: ["At lave glukose", "At lave varme", "At lave lyd", "At lave olie"], correct: 0 },
    { q: "Hvad er nødvendigt for at lave glukose?", options: ["CO₂ og vand", "Salt og vand", "Ilt og vand", "Jern og vand"], correct: 0 },
    { q: "Hvad sker der hvis planten får for lidt lys?", options: ["Fotosyntesen stopper", "Den bliver blå", "Den vokser hurtigere", "Den laver mere glukose"], correct: 0 },
    { q: "Hvad sker der hvis planten får for meget vand?", options: ["Den drukner", "Den vokser hurtigere", "Den bliver rød", "Den laver mere O₂"], correct: 0 },
    { q: "Hvad er stomata?", options: ["Små åbninger i bladet", "Rødder", "Frø", "Stængler"], correct: 0 },
    { q: "Hvad kommer ind gennem stomata?", options: ["CO₂", "Salt", "Jern", "Protein"], correct: 0 },
    { q: "Hvad kommer ud gennem stomata?", options: ["O₂", "Guld", "Nitrogen", "Vanddamp"], correct: 0 },
    { q: "Hvad er glukose for planten?", options: ["Energi", "Gift", "Vand", "Luft"], correct: 0 },
    { q: "Hvorfor er fotosyntese vigtig for mennesker?", options: ["Den laver O₂", "Den laver sten", "Den laver olie", "Den laver varme"], correct: 0 },
    { q: "Hvad er den vigtigste energikilde for fotosyntese?", options: ["Solen", "Månen", "Stjernerne", "Jorden"], correct: 0 },
    { q: "Hvad sker der om natten i planten?", options: ["Respiration", "Fotosyntese", "Fordampning", "Smeltning"], correct: 0 },
    { q: "Hvad bruger planten rødderne til?", options: ["At optage vand", "At lave lys", "At lave O₂", "At lave frø"], correct: 0 },
    { q: "Hvad er en producent i naturen?", options: ["En plante", "Et dyr", "En sten", "En sky"], correct: 0 },
    { q: "Hvad er en forbruger i naturen?", options: ["Et dyr", "En plante", "En bakterie", "En sten"], correct: 0 },
    { q: "Hvad er en fødekæde?", options: ["Hvem der spiser hvem", "En metal-kæde", "En vandkæde", "En luftkæde"], correct: 0 },
    { q: "Hvad sker der hvis planten ikke får CO₂?", options: ["Fotosyntesen stopper", "Den bliver blå", "Den vokser hurtigere", "Den laver mere O₂"], correct: 0 },
    { q: "Hvad sker der hvis planten ikke får vand?", options: ["Den visner", "Den bliver gennemsigtig", "Den bliver til sten", "Den vokser hurtigere"], correct: 0 },
    { q: "Hvad sker der hvis planten ikke får næring?", options: ["Den vokser langsomt", "Den eksploderer", "Den bliver blå", "Den laver mere glukose"], correct: 0 },
    { q: "Hvad er den kemiske formel for ilt?", options: ["O₂", "CO₂", "H₂O", "C₆H₁₂O₆"], correct: 0 },
    { q: "Hvad er den kemiske formel for sukker?", options: ["C₆H₁₂O₆", "CO₂", "H₂O", "O₂"], correct: 0 },
    { q: "Hvad er den kemiske formel for vand?", options: ["H₂O", "CO₂", "O₂", "NaCl"], correct: 0 },
    { q: "Hvad er den vigtigste del af bladet for fotosyntese?", options: ["Kloroplasterne", "Rødderne", "Frøene", "Stænglen"], correct: 0 },
    { q: "Hvad er en plantecelle fyldt med?", options: ["Vand", "Luft", "Olie", "Salt"], correct: 0 },
    { q: "Hvad er vakuolen i en plantecelle?", options: ["Et vandlager", "En motor", "En lunge", "En hjerne"], correct: 0 },
    { q: "Hvad er cellevæggen lavet af?", options: ["Cellulose", "Metal", "Protein", "Salt"], correct: 0 },
    { q: "Hvad er mitokondrier?", options: ["Cellens kraftværk", "Cellens vægge", "Cellens farve", "Cellens frø"], correct: 0 },
    { q: "Hvad laver mitokondrier?", options: ["Energi", "Lys", "Vand", "Salt"], correct: 0 },
    { q: "Hvad er respiration?", options: ["Forbrænding af glukose", "Fotosyntese", "Fordampning", "Smeltning"], correct: 0 },
    { q: "Hvornår laver planten respiration?", options: ["Hele tiden", "Kun om dagen", "Kun om natten", "Kun om vinteren"], correct: 0 },
    { q: "Hvad er en plante afhængig af?", options: ["Lys, vand, CO₂", "Guld, sølv, olie", "Plastik, glas, sten", "Lyd, varme, kulde"], correct: 0 },
    { q: "Hvad er en frugt?", options: ["En beskytter af frø", "En rod", "En stængel", "En blomst"], correct: 0 },
    { q: "Hvad er en frøplante?", options: ["En ung plante", "En gammel plante", "En død plante", "En sten"], correct: 0 },
    { q: "Hvad er pollen?", options: ["Plante-støv", "Salt", "Vand", "Jern"], correct: 0 },
    { q: "Hvad er nektar?", options: ["Sød væske i blomster", "Salt", "Vand", "Gift"], correct: 0 },
    { q: "Hvad tiltrækker bier?", options: ["Nektar", "Salt", "Jern", "CO₂"], correct: 0 },
    { q: "Hvad hjælper bier med?", options: ["Bestøvning", "Fotosyntese", "Respiration", "Fordampning"], correct: 0 }
];

function startTraining(sec) {
    timeLeft = sec;
    updateTime();
    showScreen("questionScreen");
    nextQuestion();

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTime();
        if (timeLeft <= 0) stopTraining();
    }, 1000);
}

function updateTime() {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById("timeLeft").textContent = m + ":" + (s < 10 ? "0" + s : s);
}

function stopTraining() {
    clearInterval(timer);
    showScreen("startScreen");
}

function nextQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("questionText").textContent = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = opt;

        btn.onclick = () => {
            const all = answersDiv.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if (i === q.correct) {
                btn.classList.add("correct");
                sunPower++;
                document.getElementById("sunPower").textContent = sunPower;
            } else {
                btn.classList.add("wrong");
                all[q.correct].classList.add("correct");
            }

            setTimeout(nextQuestion, 900);
        };

        answersDiv.appendChild(btn);
    });
}

function feedPlant() {
    if (sunPower <= 0) return;

    sunPower--;
    document.getElementById("sunPower").textContent = sunPower;

    plantLevel++;
    document.getElementById("plant").style.transform = `scale(${1 + plantLevel * 0.08})`;

    const leaves = document.querySelectorAll(".leaf");
    const flower = document.querySelector(".flower");

    if (plantLevel >= 3) leaves[2].classList.remove("hidden");
    if (plantLevel >= 4) leaves[3].classList.remove("hidden");
    if (plantLevel >= 5) leaves[4].classList.remove("hidden");
    if (plantLevel >= 6) leaves[5].classList.remove("hidden");
    if (plantLevel >= 7) leaves[6].classList.remove("hidden");
    if (plantLevel >= 8) leaves[7].classList.remove("hidden");
    if (plantLevel >= 9) flower.style.opacity = 1;

    if (plantLevel >= 10) {
        oxygen += 5;
        document.getElementById("oxygen").textContent = oxygen;

        makeExplosion();
        makeFallingCO2();

        plantLevel = 1;
        document.getElementById("plant").style.transform = "scale(1)";
        leaves.forEach((l, i) => { if (i > 1) l.classList.add("hidden"); });
        flower.style.opacity = 0;
    }
}

function makeExplosion() {
    for (let i = 0; i < 20; i++) {
        const p = document.createElement("div");
        p.className = "co2Particle";
        p.textContent = "CO₂";

        const angle = Math.random() * Math.PI * 2;
        const distance = 150 + Math.random() * 100;

        p.style.left = "50%";
        p.style.top = "50%";
        p.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        p.style.setProperty("--y", `${Math.sin(angle) * distance}px`);

        document.getElementById("game").appendChild(p);

        setTimeout(() => p.remove(), 1000);
    }
}

function makeFallingCO2() {
    for (let i = 0; i < 15; i++) {
        const f = document.createElement("div");
        f.className = "co2Fall";
        f.textContent = "CO₂";

        f.style.left = Math.random() * 90 + "%";
        f.style.animationDuration = (2 + Math.random() * 2) + "s";

        document.getElementById("game").appendChild(f);

        setTimeout(() => f.remove(), 4000);
    }
}
</script>

</body>
</html>
