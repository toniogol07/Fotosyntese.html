<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Fotosyntese Spil</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: white;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #game {
        width: 900px;
        max-width: 95vw;
        padding: 30px;
        border: 2px solid black;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
    }

    .hidden { display: none; }

    /* GUI */
    #gui {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .guiBox {
        border: 2px solid black;
        padding: 10px 16px;
        border-radius: 12px;
        background: #f5f5f5;
        min-width: 120px;
    }
    .guiLabel { font-size: 12px; text-transform: uppercase; }
    .guiValue { font-size: 20px; font-weight: bold; }

    /* Buttons */
    button {
        border: 2px solid black;
        background: white;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover {
        transform: translateY(-3px);
        background: #eee;
    }

    /* Plant */
    #plantContainer {
        width: 320px;
        height: 360px;
        margin: 20px auto;
        position: relative;
    }
    #plant {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 220px;
        height: 320px;
        transform-origin: bottom center;
        transition: 0.4s;
    }
    .pot {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 60px;
        background: #c47a3a;
        border-radius: 12px 12px 4px 4px;
        border: 2px solid black;
    }
    .stem {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 170px;
        background: #0c7a2b;
        border-radius: 999px;
        border: 2px solid black;
    }
    .leaf {
        position: absolute;
        width: 90px;
        height: 45px;
        background: #1ea93a;
        border-radius: 999px;
        border: 2px solid black;
        transform-origin: left center;
    }
    .leaf.left { left: 50%; transform: translateX(-50%) rotate(-25deg); }
    .leaf.right { left: 50%; transform: translateX(-50%) rotate(25deg); }
    .leaf.hidden { opacity: 0; }

    .leaf1 { bottom: 120px; }
    .leaf2 { bottom: 150px; }
    .leaf3 { bottom: 180px; }
    .leaf4 { bottom: 210px; }

    .flower {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: yellow;
        border: 2px solid black;
        opacity: 0;
        transition: 0.3s;
    }

    /* Questions */
    #questionBox {
        border: 2px solid black;
        padding: 20px;
        border-radius: 16px;
        background: #fafafa;
        margin-top: 20px;
    }
    .answerBtn {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid black;
        background: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }
    .answerBtn.correct { background: #8aff8a; border-color: green; }
    .answerBtn.wrong { background: #ff8a8a; border-color: red; }

    /* Shop Button */
    #shopButton {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 55px;
        height: 55px;
        background: white;
        border: 3px solid black;
        border-radius: 50%;
        font-size: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
        z-index: 20;
    }
    #shopButton:hover { transform: scale(1.1); }

    /* Shop Overlay */
    #shopOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        z-index: 30;
    }
    #shopPanel {
        width: 350px;
        height: 90%;
        background: white;
        border-left: 3px solid black;
        padding: 20px;
        overflow-y: auto;
    }
    .shopItem {
        border: 2px solid black;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
    }
    .shopItem:hover { background: #eee; }

    /* Character */
    #characterPreview {
        position: absolute;
        left: 40px;
        bottom: 40px;
        width: 200px;
        height: 300px;
    }
    #charBase {
        width: 120px;
        height: 180px;
        background: #ffe0b3;
        border: 3px solid black;
        border-radius: 20px;
        position: absolute;
        bottom: 0;
        left: 40px;
    }
    .charItem {
        position: absolute;
        left: 40px;
        bottom: 0;
        width: 120px;
        height: 180px;
    }
    #charHat { bottom: 140px; height: 60px; background: red; }
    #charShirt { bottom: 80px; height: 100px; background: blue; }
    #charPants { bottom: 0; height: 80px; background: green; }

    /* Popup */
    #popup {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 40;
    }
    #popupBox {
        background: white;
        padding: 30px;
        border: 3px solid black;
        border-radius: 12px;
        text-align: center;
    }
</style>
</head>
<body>

<div id="game">

    <!-- GUI -->
    <div id="gui">
        <div class="guiBox"><div class="guiLabel">Sollyskraft</div><div class="guiValue" id="sunPower">0</div></div>
        <div class="guiBox"><div class="guiLabel">CO₂</div><div class="guiValue" id="oxygen">0</div></div>
        <div class="guiBox"><div class="guiLabel">Tid</div><div class="guiValue" id="timeLeft">0</div></div>
    </div>

    <!-- Shop Button -->
    <div id="shopButton">🧍</div>

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1>Fotosyntese Træner</h1>
        <p>Træn din viden og få din plante til at vokse.</p>

        <div id="plantContainer">
            <div id="plant">
                <div class="pot"></div>
                <div class="stem"></div>
                <div class="leaf left leaf1"></div>
                <div class="leaf right leaf1"></div>
                <div class="leaf left leaf2 hidden"></div>
                <div class="leaf right leaf2 hidden"></div>
                <div class="leaf left leaf3 hidden"></div>
                <div class="leaf right leaf3 hidden"></div>
                <div class="leaf left leaf4 hidden"></div>
                <div class="leaf right leaf4 hidden"></div>
                <div class="flower"></div>
            </div>
        </div>

        <button id="trainBtn">Træn</button>
        <button id="feedBtn">Giv sollyskraft til planten</button>
    </div>

    <!-- TRAINING MENU -->
    <div id="trainingMenu" class="hidden">
        <h2>Vælg træningstid</h2>
        <button data-time="300">5 min</button>
        <button data-time="600">10 min</button>
        <button data-time="900">15 min</button>
        <button data-time="1200">20 min</button>
        <button data-time="1500">25 min</button>
        <button data-time="1800">30 min</button>
        <button id="backBtn">Tilbage</button>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="questionScreen" class="hidden">
        <h2>Træning i gang</h2>
        <div id="questionBox">
            <div id="questionText"></div>
            <div id="answers"></div>
        </div>
        <button id="stopBtn">Stop træning</button>
    </div>

    <!-- SHOP OVERLAY -->
    <div id="shopOverlay" class="hidden">
        <div id="shopPanel">
            <h2>Shop</h2>
            <div id="shopList"></div>
            <button id="closeShopBtn">Luk</button>
        </div>

        <div id="characterPreview">
            <div id="charBase"></div>
            <div id="charHat" class="charItem hidden"></div>
            <div id="charShirt" class="charItem hidden"></div>
            <div id="charPants" class="charItem hidden"></div>
        </div>
    </div>

    <!-- POPUP -->
    <div id="popup" class="hidden">
        <div id="popupBox">
            <p id="popupText"></p>
            <button id="popupOkBtn">OK</button>
        </div>
    </div>

</div>

<script>
let sunPower = 0;
let oxygen = 0;
let plantLevel = 1;
let timer = null;
let timeLeft = 0;

/* DOM refs */
const startScreen = document.getElementById("startScreen");
const trainingMenu = document.getElementById("trainingMenu");
const questionScreen = document.getElementById("questionScreen");
const timeLeftEl = document.getElementById("timeLeft");
const sunPowerEl = document.getElementById("sunPower");
const oxygenEl = document.getElementById("oxygen");
const plantEl = document.getElementById("plant");
const leaves = document.querySelectorAll(".leaf");
const flower = document.querySelector(".flower");

/* Screen helpers */
function showScreen(screen) {
    startScreen.classList.add("hidden");
    trainingMenu.classList.add("hidden");
    questionScreen.classList.add("hidden");
    screen.classList.remove("hidden");
}

/* Buttons wiring */
document.getElementById("trainBtn").onclick = () => showScreen(trainingMenu);
document.getElementById("backBtn").onclick = () => showScreen(startScreen);
document.getElementById("stopBtn").onclick = stopTraining;
document.getElementById("feedBtn").onclick = feedPlant;

/* Training menu buttons */
trainingMenu.querySelectorAll("button[data-time]").forEach(btn => {
    btn.onclick = () => {
        const sec = parseInt(btn.getAttribute("data-time"), 10);
        startTraining(sec);
    };
});

/* Questions */
const questions = [
    { q: "Hvad bruger planten som energi?", options: ["CO₂", "Sollys", "Vand", "Ilt"], correct: 1 },
    { q: "Hvad optager planten fra luften?", options: ["O₂", "CO₂", "Nitrogen", "Ozon"], correct: 1 },
    { q: "Hvad udskiller planten?", options: ["CO₂", "O₂", "Metan", "Nitrogen"], correct: 1 },
    { q: "Hvad optager planten fra jorden?", options: ["Vand", "Ilt", "CO₂", "Salt"], correct: 0 },
    { q: "Hvad danner planten?", options: ["Glukose", "Protein", "Fedt", "Jern"], correct: 0 }
];

function startTraining(sec) {
    timeLeft = sec;
    updateTime();
    showScreen(questionScreen);
    nextQuestion();

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTime();
        if (timeLeft <= 0) stopTraining();
    }, 1000);
}

function updateTime() {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    timeLeftEl.textContent = m + ":" + (s < 10 ? "0" + s : s);
}

function stopTraining() {
    if (timer) clearInterval(timer);
    timer = null;
    showScreen(startScreen);
}

function nextQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("questionText").textContent = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = opt;

        btn.onclick = () => {
            const all = answersDiv.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if (i === q.correct) {
                btn.classList.add("correct");
                sunPower++;
                sunPowerEl.textContent = sunPower;
            } else {
                btn.classList.add("wrong");
                all[q.correct].classList.add("correct");
            }

            setTimeout(nextQuestion, 900);
        };

        answersDiv.appendChild(btn);
    });
}

/* Plant */
function feedPlant() {
    if (sunPower <= 0) return;

    sunPower--;
    sunPowerEl.textContent = sunPower;

    plantLevel++;
    plantEl.style.transform = `scale(${1 + plantLevel * 0.08})`;

    if (plantLevel >= 3) leaves[2].classList.remove("hidden");
    if (plantLevel >= 4) leaves[3].classList.remove("hidden");
    if (plantLevel >= 5) leaves[4].classList.remove("hidden");
    if (plantLevel >= 6) leaves[5].classList.remove("hidden");
    if (plantLevel >= 7) leaves[6].classList.remove("hidden");
    if (plantLevel >= 8) leaves[7].classList.remove("hidden");
    if (plantLevel >= 9) flower.style.opacity = 1;

    if (plantLevel >= 10) {
        oxygen += 5;
        oxygenEl.textContent = oxygen;

        plantLevel = 1;
        plantEl.style.transform = "scale(1)";
        leaves.forEach((l, i) => { if (i > 1) l.classList.add("hidden"); });
        flower.style.opacity = 0;
    }
}

/* Shop */
const shopItems = [
    { name: "Rød Hat", type: "hat", price: 5 },
    { name: "Blå Hat", type: "hat", price: 10 },
    { name: "Guld Hat", type: "hat", price: 25 },
    { name: "Blå Trøje", type: "shirt", price: 8 },
    { name: "Sort Hoodie", type: "shirt", price: 15 },
    { name: "Guld Rustning", type: "shirt", price: 40 },
    { name: "Grøn Bukser", type: "pants", price: 6 },
    { name: "Sorte Bukser", type: "pants", price: 12 },
    { name: "Guld Bukser", type: "pants", price: 30 }
];

let owned = { hat: false, shirt: false, pants: false };

const shopOverlay = document.getElementById("shopOverlay");
const shopList = document.getElementById("shopList");
const charHat = document.getElementById("charHat");
const charShirt = document.getElementById("charShirt");
const charPants = document.getElementById("charPants");

document.getElementById("shopButton").onclick = () => {
    shopOverlay.classList.remove("hidden");
    loadShop();
};
document.getElementById("closeShopBtn").onclick = () => {
    shopOverlay.classList.add("hidden");
};

function loadShop() {
    shopList.innerHTML = "";
    shopItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "shopItem";
        div.textContent = `${item.name} – ${item.price} O₂`;

        div.onmouseenter = () => previewItem(item);
        div.onmouseleave = () => clearPreview(item);
        div.onclick = () => buyItem(item);

        shopList.appendChild(div);
    });
}

function previewItem(item) {
    if (item.type === "hat") charHat.classList.remove("hidden");
    if (item.type === "shirt") charShirt.classList.remove("hidden");
    if (item.type === "pants") charPants.classList.remove("hidden");
}

function clearPreview(item) {
    if (item.type === "hat" && !owned.hat) charHat.classList.add("hidden");
    if (item.type === "shirt" && !owned.shirt) charShirt.classList.add("hidden");
    if (item.type === "pants" && !owned.pants) charPants.classList.add("hidden");
}

function buyItem(item) {
    if (oxygen < item.price) {
        showPopup("Du har ikke nok CO₂ til at købe " + item.name + "!");
        return;
    }
    oxygen -= item.price;
    oxygenEl.textContent = oxygen;

    owned[item.type] = true;
    previewItem(item);
    showPopup("Du købte: " + item.name);
}

/* Popup */
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
document.getElementById("popupOkBtn").onclick = () => popup.classList.add("hidden");

function showPopup(text) {
    popupText.textContent = text;
    popup.classList.remove("hidden");
}
</script>

</body>
</html>
