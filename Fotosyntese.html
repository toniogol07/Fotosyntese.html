<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Fotosyntese Træner + Shop</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fff;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #game {
        width: 900px;
        max-width: 95vw;
        padding: 30px;
        border: 2px solid #000;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        position: relative;
        overflow: hidden;
    }

    .hidden { display: none; }

    /* GUI */
    #gui {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .guiBox {
        border: 2px solid #000;
        padding: 10px 16px;
        border-radius: 12px;
        background: #f5f5f5;
        min-width: 120px;
    }

    .guiLabel {
        font-size: 12px;
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    .guiValue {
        font-size: 20px;
        font-weight: bold;
    }

    /* Screens */
    .screen { animation: fadeIn .25s ease; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    button {
        border: 2px solid #000;
        background: #fff;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        background: #f0f0f0;
    }

    button:active {
        transform: translateY(0);
        box-shadow: none;
    }

    /* PLANT (kun på startskærm) */
    #plantContainer {
        width: 320px;
        height: 360px;
        margin: 20px auto;
        position: relative;
    }

    #plant {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 220px;
        height: 320px;
        transform-origin: bottom center;
        transition: transform 0.4s ease;
    }

    .pot {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 60px;
        background: #c47a3a;
        border-radius: 12px 12px 4px 4px;
        border: 2px solid #000;
    }

    .pot::before {
        content: "";
        position: absolute;
        top: -12px;
        left: -10px;
        right: -10px;
        height: 18px;
        background: #d8904a;
        border-radius: 14px;
        border: 2px solid #000;
    }

    .stem {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 170px;
        background: #0c7a2b;
        border-radius: 999px;
        border: 2px solid #000;
    }

    .leaf {
        position: absolute;
        width: 90px;
        height: 45px;
        background: #1ea93a;
        border-radius: 999px;
        border: 2px solid #000;
        transform-origin: left center;
    }

    .leaf.left {
        left: 50%;
        transform: translateX(-50%) rotate(-25deg);
    }

    .leaf.right {
        left: 50%;
        transform: translateX(-50%) rotate(25deg);
    }

    .leaf.hidden {
        opacity: 0;
    }

    .leaf1 { bottom: 120px; }
    .leaf2 { bottom: 150px; }
    .leaf3 { bottom: 180px; }
    .leaf4 { bottom: 210px; }

    .flower {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffe066 0, #ffcc00 40%, #ff9900 70%);
        border: 2px solid #000;
        box-shadow: 0 0 15px rgba(255,200,0,0.7);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    /* QUESTIONS */
    #questionBox {
        border: 2px solid #000;
        padding: 20px;
        border-radius: 16px;
        background: #fafafa;
        margin-top: 20px;
    }

    .answerBtn {
        display: block;
        width: 100%;
        text-align: left;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid #000;
        background: #fff;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    .answerBtn:hover {
        background: #f0f0f0;
    }

    .correct {
        background: #8aff8a !important;
        border-color: #009900 !important;
    }

    .wrong {
        background: #ff8a8a !important;
        border-color: #990000 !important;
    }

    /* SHOP BUTTON */
    #shopButton {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 55px;
        height: 55px;
        background: #fff;
        border: 3px solid #000;
        border-radius: 50%;
        font-size: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
        z-index: 20;
    }

    #shopButton:hover {
        transform: scale(1.1);
        background: #f0f0f0;
    }

    /* SHOP OVERLAY */
    #shopOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        z-index: 30;
    }

    #shopPanel {
        width: 350px;
        height: 90%;
        background: #fff;
        border-left: 3px solid #000;
        padding: 20px;
        overflow-y: auto;
        box-shadow: -6px 0 20px rgba(0,0,0,0.3);
    }

    #shopPanel h2 {
        margin-top: 0;
    }

    .shopItem {
        border: 2px solid #000;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    .shopItem:hover {
        background: #f0f0f0;
        transform: translateX(-5px);
    }

    /* CHARACTER PREVIEW */
    #characterPreview {
        position: absolute;
        left: 40px;
        bottom: 40px;
        width: 200px;
        height: 300px;
        pointer-events: none;
    }

    #charBase {
        width: 120px;
        height: 180px;
        background: #ffe0b3;
        border: 3px solid #000;
        border-radius: 20px;
        position: absolute;
        bottom: 0;
        left: 40px;
    }

    .charItem {
        position: absolute;
        left: 40px;
        bottom: 0;
        width: 120px;
        height: 180px;
        pointer-events: none;
    }

    #charHat {
        background: url('data:image/svg+xml;utf8,<svg width="120" height="60" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="60" fill="red" stroke="black" stroke-width="4"/></svg>') no-repeat center/contain;
        bottom: 140px;
        height: 60px;
    }

    #charShirt {
        background: url('data:image/svg+xml;utf8,<svg width="120" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="100" fill="blue" stroke="black" stroke-width="4"/></svg>') no-repeat center/contain;
        bottom: 80px;
        height: 100px;
    }

    #charPants {
        background: url('data:image/svg+xml;utf8,<svg width="120" height="80" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="80" fill="green" stroke="black" stroke-width="4"/></svg>') no-repeat center/contain;
        bottom: 0;
        height: 80px;
    }

    /* POPUP */
    #popup {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 40;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #popupBox {
        background: #fff;
        padding: 30px;
        border: 3px solid #000;
        border-radius: 12px;
        text-align: center;
        max-width: 300px;
    }
</style>
</head>
<body>

<div id="game">

    <!-- GUI -->
    <div id="gui">
        <div class="guiBox">
            <div class="guiLabel">Sollyskraft</div>
            <div class="guiValue" id="sunPower">0</div>
        </div>
        <div class="guiBox">
            <div class="guiLabel">CO₂</div>
            <div class="guiValue" id="oxygen">0</div>
        </div>
        <div class="guiBox">
            <div class="guiLabel">Tid</div>
            <div class="guiValue" id="timeLeft">0</div>
        </div>
    </div>

    <!-- SHOP BUTTON -->
    <div id="shopButton">🧍</div>

    <!-- START SCREEN -->
    <div id="startScreen" class="screen">
        <h1>Fotosyntese Træner</h1>
        <p>Træn din viden og få din plante til at vokse.</p>

        <div id="plantContainer">
            <div id="plant">
                <div class="pot"></div>
                <div class="stem"></div>
                <div class="leaf left leaf1" id="leaf1"></div>
                <div class="leaf right leaf1" id="leaf2"></div>
                <div class="leaf left leaf2 hidden" id="leaf3"></div>
                <div class="leaf right leaf2 hidden" id="leaf4"></div>
                <div class="leaf left leaf3 hidden" id="leaf5"></div>
                <div class="leaf right leaf3 hidden" id="leaf6"></div>
                <div class="leaf left leaf4 hidden" id="leaf7"></div>
                <div class="leaf right leaf4 hidden" id="leaf8"></div>
                <div class="flower" id="flower"></div>
            </div>
        </div>

        <button onclick="openTraining()">Træn</button>
        <button onclick="feedPlant()">Giv sollyskraft til planten</button>
    </div>

    <!-- TRAINING MENU -->
    <div id="trainingMenu" class="screen hidden">
        <h2>Vælg træningstid</h2>
        <p>Vælg hvor længe du vil træne.</p>
        <button onclick="startTraining(5*60)">5 min</button>
        <button onclick="startTraining(10*60)">10 min</button>
        <button onclick="startTraining(15*60)">15 min</button>
        <button onclick="startTraining(20*60)">20 min</button>
        <button onclick="startTraining(25*60)">25 min</button>
        <button onclick="startTraining(30*60)">30 min</button>
        <button onclick="backToStart()">Tilbage</button>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="questionScreen" class="screen hidden">
        <h2>Træning i gang</h2>

        <div id="questionBox">
            <div id="questionText"></div>
            <div id="answers"></div>
        </div>

        <button onclick="stopTraining()">Stop træning</button>
    </div>

    <!-- SHOP OVERLAY -->
    <div id="shopOverlay" class="hidden">
        <div id="shopPanel">
            <h2>Karakter Shop</h2>
            <p>Hold musen over for at prøve. Klik for at købe.</p>
            <div id="shopList"></div>
            <button onclick="closeShop()">Luk shop</button>
        </div>

        <div id="characterPreview">
            <div id="charBase"></div>
            <div id="charHat" class="charItem hidden"></div>
            <div id="charShirt" class="charItem hidden"></div>
            <div id="charPants" class="charItem hidden"></div>
        </div>
    </div>

    <!-- POPUP -->
    <div id="popup" class="hidden">
        <div id="popupBox">
            <p id="popupText"></p>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>

</div>

<script>
let sunPower = 0;
let oxygen = 0;
let plantLevel = 1;
let timer = null;
let timeLeft = 0;

const plant = document.getElementById("plant");
const leaves = [
    document.getElementById("leaf1"),
    document.getElementById("leaf2"),
    document.getElementById("leaf3"),
    document.getElementById("leaf4"),
    document.getElementById("leaf5"),
    document.getElementById("leaf6"),
    document.getElementById("leaf7"),
    document.getElementById("leaf8")
];
const flower = document.getElementById("flower");

const charHat = document.getElementById("charHat");
const charShirt = document.getElementById("charShirt");
const charPants = document.getElementById("charPants");

const questions = [
    { q: "Hvad bruger planten som energi i fotosyntese?", options: ["CO₂", "Sollys", "Vand", "Ilt"], correct: 1 },
    { q: "Hvilket gasstof optager planten fra luften?", options: ["O₂", "CO₂", "Nitrogen", "Ozon"], correct: 1 },
    { q: "Hvilket gasstof udskiller planten til luften?", options: ["CO₂", "O₂", "Metan", "Nitrogen"], correct: 1 },
    { q: "Hvad optager planten fra jorden gennem rødderne?", options: ["Vand", "Ilt", "CO₂", "Salt"], correct: 0 },
    { q: "Hvad hedder det sukker, planten danner?", options: ["Glukose", "Protein", "Stivelse", "Fedt"], correct: 0 },
    { q: "Hvor i planten foregår fotosyntese mest?", options: ["Rødderne", "Stammen", "Bladene", "Blomsten"], correct: 2 },
    { q: "Hvilken farve har det vigtigste pigment i fotosyntese?", options: ["Rød", "Blå", "Grøn", "Gul"], correct: 2 },
    { q: "Hvad hedder pigmentet i bladene?", options: ["Hemoglobin", "Chlorofyl", "Melanin", "Keratin"], correct: 1 },
    { q: "Hvad er den kemiske formel for kuldioxid?", options: ["O₂", "CO₂", "H₂O", "C₆H₁₂O₆"], correct: 1 },
    { q: "Hvad er den kemiske formel for vand?", options: ["H₂O", "CO₂", "O₂", "NaCl"], correct: 0 },
    { q: "Hvad er den kemiske formel for glukose?", options: ["CO₂", "H₂O", "C₆H₁₂O₆", "O₃"], correct: 2 },
    { q: "Hvilken del af planten optager vand?", options: ["Bladene", "Rødderne", "Blomsten", "Frugten"], correct: 1 },
    { q: "Hvad er fotosyntesens vigtigste affaldsprodukt?", options: ["CO₂", "O₂", "Vand", "Glukose"], correct: 1 },
    { q: "Hvornår kan fotosyntese foregå?", options: ["Kun om natten", "Kun om dagen", "Kun om vinteren", "Kun om sommeren"], correct: 1 },
    { q: "Hvad bruger planten glukose til?", options: ["At lave energi og byggesten", "At lave lyd", "At lave varme", "At lave metal"], correct: 0 },
    { q: "Hvad er fotosyntese?", options: ["Forbrænding af sukker", "Dannelsen af sukker ved hjælp af lys", "Smeltning af is", "Opløsning af salt"], correct: 1 },
    { q: "Hvilken gas er vigtig for dyr at indånde?", options: ["CO₂", "O₂", "Helium", "Argon"], correct: 1 },
    { q: "Hvilken gas hjælper med at holde varmen på Jorden?", options: ["CO₂", "O₂", "Neon", "Helium"], correct: 0 },
    { q: "Hvad sker der med CO₂ i fotosyntese?", options: ["Den bliver til vand", "Den bliver til glukose og O₂", "Den forsvinder", "Den bliver til sten"], correct: 1 },
    { q: "Hvad sker der med vand i fotosyntese?", options: ["Det bliver til glukose og O₂", "Det bliver til metal", "Det fordamper", "Det bliver til salt"], correct: 0 },
    { q: "Hvad er nødvendigt for fotosyntese?", options: ["Lys, CO₂, vand", "Lys, jern, olie", "Mørke, CO₂, vand", "Lys, salt, sand"], correct: 0 },
    { q: "Hvorfor er fotosyntese vigtig for dyr?", options: ["Den laver O₂ og mad", "Den laver sten", "Den laver metal", "Den laver lyd"], correct: 0 },
    { q: "Hvilken del af planten er ofte grøn?", options: ["Bladene", "Rødderne", "Frugten", "Frøene"], correct: 0 },
    { q: "Hvad sker der med glukose i planten?", options: ["Den bruges til energi og vækst", "Den bliver til sten", "Den forsvinder", "Den bliver til luft"], correct: 0 },
    { q: "Hvad kaldes processen hvor planter bruger O₂ og glukose til energi?", options: ["Fotosyntese", "Respiration", "Fordampning", "Filtrering"], correct: 1 },
    { q: "Hvilken type organisme kan lave fotosyntese?", options: ["Planter og alger", "Dyr", "Svampe", "Kun bakterier"], correct: 0 },
    { q: "Hvad sker der med bladene om efteråret hos mange træer?", options: ["De bliver blå", "De falder af", "De bliver gennemsigtige", "De bliver metal"], correct: 1 },
    { q: "Hvad er en stomata?", options: ["En lille åbning i bladet", "En rod", "En blomst", "En frugt"], correct: 0 },
    { q: "Hvad passerer gennem stomata?", options: ["CO₂ og O₂", "Jern", "Salt", "Sand"], correct: 0 },
    { q: "Hvad er hovedrollen for rødderne?", options: ["Fotosyntese", "Optage vand og næring", "Lave lyd", "Lave lys"], correct: 1 },
    { q: "Hvad er hovedrollen for bladene?", options: ["Lagre vand", "Fotosyntese", "Lave frø", "Lave rødder"], correct: 1 },
    { q: "Hvad er hovedrollen for blomsten?", options: ["Fotosyntese", "Formering", "Optage vand", "Lave rødder"], correct: 1 },
    { q: "Hvad er hovedrollen for frugten?", options: ["Beskytte frø", "Lave fotosyntese", "Optage CO₂", "Lave vand"], correct: 0 },
    { q: "Hvad er en producent i et økosystem?", options: ["Et dyr", "En plante", "En sten", "En svamp"], correct: 1 },
    { q: "Hvad er en forbruger i et økosystem?", options: ["En plante", "Et dyr", "En sten", "En sky"], correct: 1 },
    { q: "Hvad er en fødekæde?", options: ["En række af hvem der spiser hvem", "En metal-kæde", "En vandkæde", "En luftkæde"], correct: 0 },
    { q: "Hvad sker der hvis der ikke er lys?", options: ["Fotosyntese stopper", "Fotosyntese bliver hurtigere", "Fotosyntese bliver til lyd", "Fotosyntese bliver til vand"], correct: 0 },
    { q: "Hvad sker der hvis planten ikke får vand?", options: ["Den vokser hurtigere", "Den visner", "Den bliver til sten", "Den bliver til luft"], correct: 1 },
    { q: "Hvad sker der hvis planten ikke får CO₂?", options: ["Fotosyntese stopper", "Fotosyntese bliver hurtigere", "Den laver mere O₂", "Den bliver blå"], correct: 0 },
    { q: "Hvad sker der hvis planten ikke får lys?", options: ["Den laver mere glukose", "Den laver ingen fotosyntese", "Den bliver gennemsigtig", "Den bliver til metal"], correct: 1 },
    { q: "Hvad er en grøn plante afhængig af for at leve?", options: ["Lys, vand, CO₂", "Guld, sølv, olie", "Plastik, glas, sten", "Lyd, varme, kulde"], correct: 0 },
    { q: "Hvad er ilt vigtig for?", options: ["Forbrænding i dyr og mennesker", "At lave sten", "At lave metal", "At lave glas"], correct: 0 },
    { q: "Hvad er kuldioxid vigtig for i planter?", options: ["Fotosyntese", "Respiration", "Fordampning", "Smeltning"], correct: 0 },
    { q: "Hvad er den vigtigste energikilde for Jorden?", options: ["Månen", "Solen", "Mars", "Saturn"], correct: 1 },
    { q: "Hvad er en celle?", options: ["En lille byggesten i levende ting", "En sten", "En sky", "En lyd"], correct: 0 },
    { q: "Hvor i plantecellen foregår fotosyntese?", options: ["Mitokondrier", "Kloroplaster", "Kernen", "Vakuolen"], correct: 1 }
];

function show(id) {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("trainingMenu").classList.add("hidden");
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById(id).classList.remove("hidden");
}

function openTraining() { show("trainingMenu"); }
function backToStart() { show("startScreen"); }

function startTraining(sec) {
    timeLeft = sec;
    updateTime();
    show("questionScreen");
    nextQuestion();

    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTime();
        if (timeLeft <= 0) stopTraining();
    }, 1000);
}

function updateTime() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    document.getElementById("timeLeft").textContent =
        minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
}

function stopTraining() {
    if (timer) clearInterval(timer);
    timer = null;
    show("startScreen");
}

function nextQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("questionText").textContent = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = opt;

        btn.onclick = () => {
            const all = answersDiv.querySelectorAll("button");
            all.forEach(b => b.disabled = true);

            if (i === q.correct) {
                btn.classList.add("correct");
                sunPower++;
                document.getElementById("sunPower").textContent = sunPower;
            } else {
                btn.classList.add("wrong");
                all[q.correct].classList.add("correct");
            }

            setTimeout(nextQuestion, 900);
        };

        answersDiv.appendChild(btn);
    });
}

function feedPlant() {
    if (sunPower <= 0) return;

    sunPower--;
    document.getElementById("sunPower").textContent = sunPower;

    plantLevel++;
    plant.style.transform = `scale(${1 + plantLevel * 0.08})`;

    if (plantLevel >= 2) leaves[2].classList.remove("hidden");
    if (plantLevel >= 3) leaves[3].classList.remove("hidden");
    if (plantLevel >= 4) leaves[4].classList.remove("hidden");
    if (plantLevel >= 5) leaves[5].classList.remove("hidden");
    if (plantLevel >= 6) leaves[6].classList.remove("hidden");
    if (plantLevel >= 7) leaves[7].classList.remove("hidden");
    if (plantLevel >= 8) flower.style.opacity = 1;

    if (plantLevel >= 10) {
        oxygen += 5;
        document.getElementById("oxygen").textContent = oxygen;

        plantLevel = 1;
        plant.style.transform = "scale(1)";
        leaves.forEach((l, idx) => { if (idx > 1) l.classList.add("hidden"); });
        flower.style.opacity = 0;
    }
}

/* SHOP LOGIK */
const shopItems = [
    { name: "Rød Hat", type: "hat", price: 5 },
    { name: "Blå Hat", type: "hat", price: 10 },
    { name: "Guld Hat", type: "hat", price: 25 },

    { name: "Blå Trøje", type: "shirt", price: 8 },
    { name: "Sort Hoodie", type: "shirt", price: 15 },
    { name: "Guld Rustning", type: "shirt", price: 40 },

    { name: "Grøn Bukser", type: "pants", price: 6 },
    { name: "Sorte Bukser", type: "pants", price: 12 },
    { name: "Guld Bukser", type: "pants", price: 30 }
];

let owned = { hat: false, shirt: false, pants: false };

document.getElementById("shopButton").onclick = () => {
    document.getElementById("shopOverlay").classList.remove("hidden");
    loadShop();
};

function closeShop() {
    document.getElementById("shopOverlay").classList.add("hidden");
}

function loadShop() {
    const list = document.getElementById("shopList");
    list.innerHTML = "";

    // sørg for at de dyreste ender nederst (array er allerede sorteret stigende)
    shopItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "shopItem";
        div.textContent = `${item.name} – ${item.price} O₂`;

        div.onmouseenter = () => previewItem(item);
        div.onmouseleave = () => clearPreview(item);
        div.onclick = () => buyItem(item);

        list.appendChild(div);
    });
}

function previewItem(item) {
    if (item.type === "hat") charHat.classList.remove("hidden");
    if (item.type === "shirt") charShirt.classList.remove("hidden");
    if (item.type === "pants") charPants.classList.remove("hidden");
}

function clearPreview(item) {
    if (item.type === "hat" && !owned.hat) charHat.classList.add("hidden");
    if (item.type === "shirt" && !owned.shirt) charShirt.classList.add("hidden");
    if (item.type === "pants" && !owned.pants) charPants.classList.add("hidden");
}

function buyItem(item) {
    if (oxygen < item.price) {
        showPopup("Du har ikke nok O₂ til at købe " + item.name + "!");
        return;
    }

    oxygen -= item.price;
    document.getElementById("oxygen").textContent = oxygen;

    owned[item.type] = true;
    previewItem(item);

    showPopup("Du købte: " + item.name);
}

/* POPUP */
function showPopup(text) {
    document.getElementById("popupText").textContent = text;
    document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
    document.getElementById("popup").classList.add("hidden");
}
</script>

</body>
</html>
