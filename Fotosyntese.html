<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Fotosyntese Træner</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fff;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #game {
        width: 900px;
        max-width: 95vw;
        padding: 30px;
        border: 2px solid #000;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        position: relative;
    }

    /* GUI */
    #gui {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .guiBox {
        border: 2px solid #000;
        padding: 10px 16px;
        border-radius: 12px;
        background: #f5f5f5;
        min-width: 120px;
    }

    .guiLabel {
        font-size: 12px;
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    .guiValue {
        font-size: 20px;
        font-weight: bold;
    }

    /* Screens */
    .screen { animation: fadeIn .25s ease; }
    .hidden { display: none; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    button {
        border: 2px solid #000;
        background: #fff;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        background: #f0f0f0;
    }

    button:active {
        transform: translateY(0);
        box-shadow: none;
    }

    /* PLANT */
    #plantContainer {
        width: 300px;
        height: 350px;
        margin: 20px auto;
        position: relative;
    }

    #plantImg {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        transition: transform 0.4s ease;
    }

    /* QUESTIONS */
    #questionBox {
        border: 2px solid #000;
        padding: 20px;
        border-radius: 16px;
        background: #fafafa;
        margin-top: 20px;
    }

    .answerBtn {
        display: block;
        width: 100%;
        text-align: left;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid #000;
        background: #fff;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    .answerBtn:hover {
        background: #f0f0f0;
    }

    .correct {
        background: #8aff8a !important;
        border-color: #009900 !important;
    }

    .wrong {
        background: #ff8a8a !important;
        border-color: #990000 !important;
    }

</style>
</head>
<body>

<div id="game">

    <!-- GUI -->
    <div id="gui">
        <div class="guiBox">
            <div class="guiLabel">Sollyskraft</div>
            <div class="guiValue" id="sunPower">0</div>
        </div>
        <div class="guiBox">
            <div class="guiLabel">CO₂</div>
            <div class="guiValue" id="oxygen">0</div>
        </div>
        <div class="guiBox">
            <div class="guiLabel">Tid</div>
            <div class="guiValue" id="timeLeft">0</div>
        </div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="screen">
        <h1>Fotosyntese Træner</h1>
        <p>Træn din viden og få din plante til at vokse.</p>

        <div id="plantContainer">
            <img id="plantImg" src="https://i.imgur.com/7yUQFQx.png">
        </div>

        <button onclick="openTraining()">Træn</button>
        <button onclick="feedPlant()">Giv sollyskraft til planten</button>
    </div>

    <!-- TRAINING MENU -->
    <div id="trainingMenu" class="screen hidden">
        <h2>Vælg træningstid</h2>
        <button onclick="startTraining(900)">15 Min.</button>
        <button onclick="startTraining(1200)">20 Min.</button>
        <button onclick="startTraining(1500)">25 Min.</button>
        <button onclick="backToStart()">Tilbage</button>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="questionScreen" class="screen hidden">
        <h2>Træning i gang</h2>

        <div id="questionBox">
            <div id="questionText"></div>
            <div id="answers"></div>
        </div>

        <button onclick="stopTraining()">Stop træning</button>
    </div>

</div>

<script>
let sunPower = 0;
let oxygen = 0;
let plantLevel = 1;
let timer = null;
let timeLeft = 0;

const plantImg = document.getElementById("plantImg");

const questions = [
    { q: "Hvad bruger planten som energi?", options: ["CO₂", "Vand", "Sollys", "Ilt"], correct: 2 },
    { q: "Hvad optager planten fra luften?", options: ["O₂", "CO₂", "Nitrogen", "Glukose"], correct: 1 },
    { q: "Hvad udskiller planten?", options: ["CO₂", "Vand", "O₂", "Støv"], correct: 2 },
    { q: "Hvad optager planten fra jorden?", options: ["Vand", "Ilt", "CO₂", "Sollys"], correct: 0 },
    { q: "Hvad producerer planten?", options: ["Glukose", "Salt", "Protein", "Jern"], correct: 0 }
];

function show(id) {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("trainingMenu").classList.add("hidden");
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById(id).classList.remove("hidden");
}

function openTraining() { show("trainingMenu"); }
function backToStart() { show("startScreen"); }

function startTraining(sec) {
    timeLeft = sec;
    document.getElementById("timeLeft").textContent = sec;

    show("questionScreen");
    nextQuestion();

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timeLeft").textContent = timeLeft;
        if (timeLeft <= 0) stopTraining();
    }, 1000);
}

function stopTraining() {
    clearInterval(timer);
    show("startScreen");
}

function nextQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("questionText").textContent = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = opt;

        btn.onclick = () => {
            if (i === q.correct) {
                btn.classList.add("correct");
                sunPower++;
                document.getElementById("sunPower").textContent = sunPower;
            } else {
                btn.classList.add("wrong");
            }

            setTimeout(nextQuestion, 700);
        };

        answersDiv.appendChild(btn);
    });
}

function feedPlant() {
    if (sunPower <= 0) return;

    sunPower--;
    document.getElementById("sunPower").textContent = sunPower;

    plantLevel++;
    plantImg.style.transform = `scale(${1 + plantLevel * 0.1})`;

    if (plantLevel >= 10) {
        oxygen += 5;
        document.getElementById("oxygen").textContent = oxygen;
        plantLevel = 1;
        plantImg.style.transform = "scale(1)";
    }
}
</script>

</body>
</html>
